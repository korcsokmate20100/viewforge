<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thumbnail Analyzer — ViewForge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600;700&family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=10">
<script src="settings.js?v=1"></script>
<style>
.drop-zone{border:2px dashed var(--line);border-radius:14px;padding:30px;text-align:center;cursor:pointer;transition:border-color .2s ease;margin-bottom:16px;}
.drop-zone:hover, .drop-zone.drag{border-color:var(--brand);}
.drop-zone img{max-width:100%;max-height:220px;border-radius:10px;margin-top:12px;}
.score-ring{font-family:'Space Grotesk',sans-serif;font-size:44px;font-weight:700;text-align:center;margin-bottom:6px;}
.score-label{text-align:center;color:var(--text-dim);font-size:12.5px;margin-bottom:20px;}
.fb-section{margin-bottom:14px;}
.fb-title{font-size:12px;font-family:'IBM Plex Mono',monospace;margin-bottom:8px;}
.fb-list{list-style:none;padding:0;margin:0;font-size:13.5px;}
.fb-list li{padding:5px 0;}
</style>
</head>
<body class="page-fade">

<div class="wrap" style="max-width:1000px;padding-top:0;">
  <div class="dash-top">
    <a href="index.html" class="logo"><span class="logo-mark"></span>ViewForge</a>
    <div id="userButton"></div>
  </div>

  <div class="tool-shell" id="dashShell">
    <a class="back-link" href="dashboard.html">← Vissza a dashboardra</a>

    <div class="anim-in" style="margin-bottom:22px;">
      <div class="sec-eyebrow">🖼 Thumbnail Analyzer</div>
      <h1 class="sec-title" style="font-size:24px;">Kapj pontszámot és javítási tippeket</h1>
    </div>

    <div class="tool-grid-2col">
      <div class="panel anim-in" style="animation-delay:.12s;">
        <div class="panel-title">Töltsd fel a borítóképed</div>
        <div class="panel-sub">JPG vagy PNG, max. 5 MB</div>

        <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
          <div id="dropText">📁 Kattints ide vagy húzd ide a képet</div>
          <img id="previewImg" style="display:none;" />
        </div>
        <input type="file" id="fileInput" accept="image/jpeg,image/png" style="display:none;" />

        <button class="btn btn-primary" id="generateBtn" style="width:100%;justify-content:center;" onclick="analyzeThumbnail()" disabled>⚡ Elemzés</button>
        <div id="limitMsg" class="limit-msg" style="display:none;"></div>
      </div>

      <div class="panel anim-in" style="animation-delay:.28s;">
        <div class="panel-title">Eredmény</div>
        <div class="panel-sub">
          <span class="usage-pill" id="usagePill">0 / 5 ma</span>
        </div>
        <div id="resultsWrap">
          <div class="result-empty">Tölts fel egy képet balra →</div>
        </div>
        <div class="history-section" id="historySection" style="display:none;">
          <div class="history-title">Korábbi elemzések</div>
          <div id="historyList"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script defer crossorigin="anonymous" src="https://fancy-bullfrog-66.clerk.accounts.dev/npm/@clerk/ui@1/dist/ui.browser.js" type="text/javascript"></script>
<script defer crossorigin="anonymous" data-clerk-publishable-key="pk_test_ZmFuY3ktYnVsbGZyb2ctNjYuY2xlcmsuYWNjb3VudHMuZGV2JA" src="https://fancy-bullfrog-66.clerk.accounts.dev/npm/@clerk/clerk-js@6/dist/clerk.browser.js" type="text/javascript"></script>

<script>
const PLANS = [
  {id:'free', name:'Free trial', dailyLimit:5, monthlyLimit:null},
  {id:'basic', name:'Basic', dailyLimit:null, monthlyLimit:100},
  {id:'pro', name:'Pro', dailyLimit:null, monthlyLimit:Infinity},
];
function planInfo(id){ return PLANS.find(p => p.id === id) || PLANS[0]; }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function vfMeta(){ return (Clerk.user.unsafeMetadata && Clerk.user.unsafeMetadata.viewforge) || {}; }
async function saveVfMeta(partial){
  const current = vfMeta();
  await Clerk.user.update({ unsafeMetadata: { ...Clerk.user.unsafeMetadata, viewforge: { ...current, ...partial } } });
}
function currentUsage(meta){ return (meta.usage && meta.usage.date === todayStr()) ? meta.usage.count : 0; }

function renderUsage(){
  const meta = vfMeta();
  const info = planInfo(meta.plan || 'free');
  const used = currentUsage(meta);
  const limitText = info.dailyLimit ? (used + ' / ' + info.dailyLimit + ' ma') : (info.monthlyLimit === Infinity ? used + ' / ∞' : used + ' / ' + info.monthlyLimit + ' hó');
  document.getElementById('usagePill').textContent = limitText;
  const atLimit = info.dailyLimit ? used >= info.dailyLimit : (info.monthlyLimit !== Infinity && used >= info.monthlyLimit);
  const limitMsg = document.getElementById('limitMsg');
  if (atLimit){ limitMsg.style.display = 'block'; limitMsg.textContent = `Elérted a(z) ${info.name} csomag limitjét. Válts nagyobb csomagra a dashboardon.`; }
  else { limitMsg.style.display = 'none'; }
  return atLimit;
}
async function incrementUsage(){
  const meta = vfMeta();
  const used = currentUsage(meta);
  const totalXp = (meta.totalGenerations || 0) + 1;
  await saveVfMeta({ usage: { count: used + 1, date: todayStr() }, totalGenerations: totalXp });
}

let selectedFile = null;
let selectedBase64 = null;

function handleFile(file){
  if (!file) return;
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = (e) => {
    const result = e.target.result;
    selectedBase64 = result.split(',')[1];
    document.getElementById('previewImg').src = result;
    document.getElementById('previewImg').style.display = 'block';
    document.getElementById('dropText').textContent = file.name;
    document.getElementById('generateBtn').disabled = false;
  };
  reader.readAsDataURL(file);
}

document.getElementById('fileInput').addEventListener('change', (e) => handleFile(e.target.files[0]));
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', (e) => { e.preventDefault(); dz.classList.remove('drag'); handleFile(e.dataTransfer.files[0]); });

function renderResult(result){
  const wrap = document.getElementById('resultsWrap');
  const color = result.score >= 70 ? 'var(--mint)' : result.score >= 40 ? 'var(--gold)' : 'var(--hot)';
  const fullText = `Thumbnail pontszám: ${result.score}/100\n\nJó:\n${(result.good||[]).map(g=>'- '+g).join('\n')}\n\nJavítandó:\n${(result.bad||[]).map(b=>'- '+b).join('\n')}\n\nJavaslatok:\n${(result.suggestions||[]).map(s=>'- '+s).join('\n')}`;
  wrap.innerHTML = `
    <div class="score-ring" style="color:${color};">${result.score}/100</div>
    <div class="score-label">Thumbnail pontszám</div>
    <div class="fb-section"><div class="fb-title" style="color:var(--mint);">✓ JÓ</div><ul class="fb-list">${(result.good||[]).map(g=>`<li>${g}</li>`).join('')}</ul></div>
    <div class="fb-section"><div class="fb-title" style="color:var(--hot);">✕ JAVÍTANDÓ</div><ul class="fb-list">${(result.bad||[]).map(b=>`<li>${b}</li>`).join('')}</ul></div>
    <div class="fb-section"><div class="fb-title" style="color:var(--gold);">💡 JAVASLATOK</div><ul class="fb-list">${(result.suggestions||[]).map(s=>`<li>${s}</li>`).join('')}</ul></div>
    <div class="copy-btn" id="copyResultBtn">📋 Elemzés másolása</div>
  `;
  document.getElementById('copyResultBtn').addEventListener('click', (e) => copyToClipboard(e.target, fullText));
}

function copyToClipboard(btn, text){
  navigator.clipboard.writeText(text).then(() => {
    const original = btn.textContent;
    btn.textContent = '✓ Másolva';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = original; btn.classList.remove('copied'); }, 1800);
  });
}

function showSkeleton(){
  const wrap = document.getElementById('resultsWrap');
  wrap.innerHTML = `
    <div class="skeleton-card" style="text-align:center;"><div class="skeleton-line w40" style="margin:0 auto 10px;height:36px;"></div></div>
    <div class="skeleton-card"><div class="skeleton-line w60"></div><div class="skeleton-line w85"></div></div>
    <div class="skeleton-card"><div class="skeleton-line w60"></div><div class="skeleton-line w40"></div></div>
  `;
}

async function saveHistory(result){
  const meta = vfMeta();
  const history = Array.isArray(meta.thumbnailHistory) ? meta.thumbnailHistory : [];
  history.unshift({ ts: Date.now(), score: result.score, good: result.good, bad: result.bad, suggestions: result.suggestions });
  await saveVfMeta({ thumbnailHistory: history.slice(0, 5) });
  renderHistory();
}

function renderHistory(){
  const meta = vfMeta();
  const history = Array.isArray(meta.thumbnailHistory) ? meta.thumbnailHistory : [];
  const section = document.getElementById('historySection');
  if (history.length === 0){ section.style.display = 'none'; return; }
  section.style.display = 'block';
  const list = document.getElementById('historyList');
  list.innerHTML = history.map((h, i) => `
    <div class="history-item" data-idx="${i}">
      <div class="h-content"><div class="h-time">${new Date(h.ts).toLocaleString('hu-HU')} — ${h.score}/100 pont</div></div>
      <div class="history-del" data-del="${i}">✕</div>
    </div>
  `).join('');
  list.querySelectorAll('.h-content').forEach((el, i) => {
    el.addEventListener('click', () => renderResult(history[i]));
  });
  list.querySelectorAll('.history-del').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const idx = parseInt(btn.dataset.del, 10);
      history.splice(idx, 1);
      await saveVfMeta({ thumbnailHistory: history });
      renderHistory();
    });
  });
}

async function analyzeThumbnail(){
  if (renderUsage()) return;
  if (!selectedBase64){ alert('Tölts fel egy képet!'); return; }

  const btn = document.getElementById('generateBtn');
  const wrap = document.getElementById('resultsWrap');
  btn.disabled = true; btn.textContent = '⚡ Elemzés…'; btn.classList.add('loading');
  showSkeleton();

  try{
    const token = await Clerk.session.getToken();
    const res = await fetch('/api/analyze-thumbnail', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ imageBase64: selectedBase64, mimeType: selectedFile.type }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Ismeretlen hiba');
    renderResult(data);
    await incrementUsage();
    await saveHistory(data);
    renderUsage();
  }catch(e){
    wrap.innerHTML = `<div class="result-empty" style="color:#FF4D8D;">❌ ${e.message}</div>`;
  }finally{
    btn.disabled = false; btn.textContent = '⚡ Elemzés'; btn.classList.remove('loading');
  }
}

window.addEventListener('load', async function () {
  try {
    await Clerk.load({ ui: { ClerkUI: window.__internal_ClerkUICtor } });
    if (!Clerk.isSignedIn) { window.location.href = 'sign-in.html'; return; }
    Clerk.mountUserButton(document.getElementById('userButton'), { afterSignOutUrl: 'index.html' });
    applySettings((vfMeta().settings) || {});
    initSettingsPanel();

    const meta = vfMeta();
    if (!meta.creatorProfile) { window.location.href = 'dashboard.html'; return; }

    renderUsage();
    renderHistory();
    document.getElementById('dashShell').classList.add('ready');
    // Az anim-in animaciokat csak MOST inditjuk ujra, hogy ne "lathatatlanul" jatszodjanak le
    // a konteneren mig az opacity:0 volt (Clerk betoltese alatt).
    document.querySelectorAll('#dashShell .anim-in').forEach(el => {
      el.style.animation = 'none';
      void el.offsetWidth;
      el.style.animation = '';
    });
  } catch (e) {
    document.body.innerHTML = '<div class="wrap" style="padding-top:80px;">A Clerk nincs megfelelően beállítva ezen az oldalon.</div>';
    console.error(e);
  }
});
</script>

</body>
</html>
